<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Purchase Order</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f4f6f9; }
.form-card{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
}
.table td input, .table td select { width:100%; }
</style>
</head>
<body>
  <script src="https://accounts.google.com/gsi/client" async defer></script>


<div class="position-fixed top-0 end-0 p-3" style="z-index: 1050">
  <div id="poToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toastMessage">
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>
<div class="container py-5">
  <div id="navbarContainer"></div>
  <div class="row justify-content-center">
    <div class="col-md-12">
      <div class="form-card">

        <div class="d-flex justify-content-between mb-4">
          <h3>Create Purchase Order</h3>
          <a href="dashboard.html" class="btn btn-secondary">Back</a>
        </div>

        <form id="poForm">
          <div class="row mb-4">
            <div class="col-md-4">
              <label class="form-label">Reference No</label>
              <input type="text" class="form-control" id="referenceNo" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Vendor</label>
              <select class="form-control" id="vendorSelect" required>
                <option value="">Select Vendor</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <select class="form-control" id="status">
                <option>Pending</option>
                <option>Approved</option>
                <option>Rejected</option>
              </select>
            </div>
          </div>

          <h5 class="mb-3">Products</h5>

          <table class="table table-bordered" id="productsTable">
            <thead class="table-light">
              <tr>
                <th>Product</th>
                <th>Description</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Sub-Total</th>
                <th><button type="button" class="btn btn-success btn-sm" id="addRowBtn">+</button></th>
              </tr>
            </thead>
            <tbody>
              <!-- Product rows will be added here -->
            </tbody>
          </table>

          <div class="row mt-3 justify-content-end">
            <div class="col-md-3">
              <label class="form-label">Tax (5%)</label>
              <input type="number" class="form-control" id="tax" readonly value="0">
            </div>
            <div class="col-md-3">
              <label class="form-label">Total Amount</label>
              <input type="number" class="form-control" id="totalAmount" readonly value="0">
            </div>
          </div>

          <div class="text-end mt-4">
            <button type="submit" class="btn btn-dark">Create PO</button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="navbar.js"></script>
<script>
  loadNavbar();
</script>

<script>

function showAleart(success,message){
    const toastEl = document.getElementById('poToast');
    toastEl.className = `toast align-items-center border-0 text-white ${
        success? "bg-success" : "bg-danger" 
    }`;
    const toastBody = document.getElementById('toastMessage')
    toastBody.textContent = message
    const toast = new bootstrap.Toast(toastEl);
    toast.show();
}
// Load vendors and products from LocalStorage
let products = []
let vendors = []
async function loadData() {
    vendors = await apiFetch('vendors')
    products = await apiFetch('products')
    console.log(products)
    addProductRow();
    let vendorSelect = document.getElementById("vendorSelect");
    vendors.forEach((v,index)=>{ 
        let option = document.createElement("option"); 
        option.value=v.id; 
        option.text=v.name; 
        vendorSelect.appendChild(option);
    });
}
loadData()

// Function to add new product row
let productsTable = document.querySelector("#productsTable tbody");
let totalAmountInput = document.getElementById("totalAmount");
let taxInput = document.getElementById("tax");

function addProductRow(){
  let row = document.createElement("tr");
  row.innerHTML = `
    <td>
      <select class="form-control productSelect">
        <option value="">Select Product</option>
        ${products.map((p,i)=>`<option value="${i}">${p.name}</option>`).join("")}
      </select>
    </td>
    <td><input type="text" class="form-control description" readonly></td>
    <td><input type="number" class="form-control price" readonly></td>
    <td><input type="number" class="form-control qty" value="1" min="1"></td>
    <td><input type="number" class="form-control subtotal" readonly value="0"></td>
    <td><button type="button" class="btn btn-danger btn-sm removeRowBtn">-</button></td>
  `;
  
  productsTable.appendChild(row);

  attachRowEvents(row);
}

// Attach events for product selection and quantity change
function attachRowEvents(row){
  let productSelect = row.querySelector(".productSelect");
  let description = row.querySelector(".description");
  let price = row.querySelector(".price");
  let qty = row.querySelector(".qty");
  let subtotal = row.querySelector(".subtotal");
  let removeBtn = row.querySelector(".removeRowBtn");

  productSelect.addEventListener("change", function(){
    let p = products[this.value];
    console.log(p)
    if(p){
      description.value = p.description;
      price.value = p.unit_price;
      subtotal.value = p.unit_price * qty.value;
      updateTotals();
    }
  });

  qty.addEventListener("input", function(){
    subtotal.value = price.value * qty.value;
    updateTotals();
  });

  removeBtn.addEventListener("click", function(){
    row.remove();
    updateTotals();
  });
}

// Update totals and tax
function updateTotals(){
  let subtotalSum = 0;
  document.querySelectorAll(".subtotal").forEach(s=>subtotalSum+=Number(s.value));
  let tax = subtotalSum * 0.05;
  taxInput.value = tax.toFixed(2);
  totalAmountInput.value = (subtotalSum + tax).toFixed(2);
}

// Add new row button
document.getElementById("addRowBtn").addEventListener("click", addProductRow);

// Submit PO
document.getElementById("poForm").addEventListener("submit", async function(e){
  e.preventDefault();

  let poProducts = [];
  document.querySelectorAll("#productsTable tbody tr").forEach(row=>{
    let productIndex = row.querySelector(".productSelect").value;
    if(productIndex!==""){
      poProducts.push({
        product_id: products[productIndex].id,
        price: row.querySelector(".price").value,
        quantity: row.querySelector(".qty").value,
      });
    }
  });
  let vendorSelect = document.getElementById("vendorSelect")
  let po = {
    reference_no: document.getElementById("referenceNo").value,
    vendor_id: vendorSelect.options[vendorSelect.selectedIndex].value,
    items: poProducts,
    status: document.getElementById("status").value
  };
  console.log(po)
  
  const res = await apiFetch('create-purchase-order',{
    method: 'POST',
    body: JSON.stringify(po),
    headers: {
        "Authorization": `Bearer ${token}`
    }
  });

  document.getElementById("poForm").reset();
  productsTable.innerHTML = "";
  addProductRow();
  updateTotals();
});
</script>


</body>
</html>
