<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Vendor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
    background:#f5f6fa;
    }
    .form-card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }
    #ratingStars span{
    cursor:pointer;
    }
</style>

</head>

<body>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<div class="position-fixed top-0 end-0 p-3" style="z-index: 1050">
  <div id="poToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toastMessage">
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>
<div class="container py-5">
    <div id="navbarContainer"></div>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="form-card">
                <div class="d-flex justify-content-between mb-4">
                    <h3>Create New Vendor</h3>
                    <a href="dashboard.html" class="btn btn-secondary">Back</a>
                </div>
                <form id="vendorForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Vendor Name</label>
                            <input type="text" class="form-control" id="vendorName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact</label>
                            <input type="tel" class="form-control" id="contact">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Vendor Rating</label>
                            <div id="ratingStars" class="fs-3 text-warning">
                                <span data-value="1">☆</span>
                                <span data-value="2">☆</span>
                                <span data-value="3">☆</span>
                                <span data-value="4">☆</span>
                                <span data-value="5">☆</span>
                            </div>
                            <input type="hidden" id="vendorRating" value="0">
                        </div>
                    </div>
                    <div class="text-end mt-3">
                        <button type="reset" class="btn btn-outline-secondary me-2">Clear</button>
                        <button type="submit" class="btn btn-primary">Save Vendor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="navbar.js"></script>
<script>
  loadNavbar();
</script>

<script>
    function showAleart(success,message){
        const toastEl = document.getElementById('poToast');
        toastEl.className = `toast align-items-center border-0 text-white ${
            success? "bg-success" : "bg-danger" 
        }`;
        const toastBody = document.getElementById('toastMessage')
        toastBody.textContent = message
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
    }
  
    let stars = document.querySelectorAll("#ratingStars span");
    let ratingInput = document.getElementById("vendorRating");
    stars.forEach(star => {
        star.addEventListener("click", function(){
            let value = this.getAttribute("data-value");
            ratingInput.value = value;
            stars.forEach(s => {
                s.textContent = "☆";
            });
            for(let i=0;i<value;i++){
            stars[i].textContent="★";
            }
        });
    });

    document.getElementById("vendorForm").addEventListener("submit", async function(e){
    e.preventDefault();
    let vendor = {
        name:document.getElementById("vendorName").value,
        contact:document.getElementById("contact").value,
        rating:document.getElementById("vendorRating").value
    };
    const res = await apiFetch('create-vendor',{
        method: 'POST',
        body: JSON.stringify(vendor),
        headers: {
        "Authorization": `Bearer ${token}`
    }
    });
    document.getElementById("vendorForm").reset();
});
</script>
</body>
</html>
